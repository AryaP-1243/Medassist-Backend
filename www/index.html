<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🩺 MedAssist</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 20px; }
        h1 { color: #2e7d32; }
        #output { white-space: pre-wrap; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
        textarea { width: 100%; height: 100px; padding: 10px; border-radius: 5px; border: 1px solid #ccc; }
        button { padding: 10px 20px; margin: 10px 5px; border: none; border-radius: 5px; background: #4caf50; color: #fff; font-size: 16px; cursor: pointer; }
        button.voice { background: #6a1b9a; }
        select { padding: 10px; font-size: 16px; margin-top: 10px; }
        #output.error { color: red; font-weight: bold; }
    </style>
</head>
<body>

    <h1>🩺 <b>MedAssist</b></h1>
    <p>Type or speak your symptoms or medicine-related questions:</p>

    <textarea id="input" placeholder="Describe your symptoms or ask about a medicine..."></textarea><br>

    <select id="type">
        <option value="symptom">Symptom</option>
        <option value="medicine">Medicine</option>
    </select><br>

    <button onclick="sendRequest()">Ask</button>
    <button class="voice" onclick="startVoiceInput()">🎤 Voice Input</button>

    <h3>Response:</h3>
    <div id="output">Waiting for input...</div>

    <script src="script.js"></script>

</body>
</html>
