<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MedAssist</title>
    <link rel="manifest" href="/manifest.json">
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 600px;
            margin: auto;
            background: #f9f9f9;
        }
        h1 {
            color: #2e7d32;
        }
        textarea {
            width: 100%;
            height: 100px;
            font-size: 16px;
            padding: 10px;
            margin-top: 10px;
        }
        button {
<select id="type">
    <option value="symptom">Symptom</option>
    <option value="medicine">Medicine</option>
</select>

<br>

<button id="askBtn">Ask</button>
<button id="voiceBtn">🎙️ Voice Input</button>              }
        #askBtn { background: #4CAF50; color: white; }
        #voiceBtn { background: #8BC34A; color: white; }
        #response { margin-top: 20px; background: #fff; padding: 15px; border-radius: 8px; box-shadow: 0 0 5px rgba(0,0,0,0.1); white-space: pre-wrap; }
    </style>
</head>
<body>
    <h1>🩺 MedAssist</h1>
    <p>Type or speak your symptoms or questions:</p>
    <textarea id="message"></textarea><br>
    <button id="askBtn">Ask</button>
    <button id="voiceBtn">🎙️ Voice Input</button>

    <div id="response">❌ No response.</div>

    <script src="script.js"></script>
</body>
</html>
